# ============================================================
# US Market Dual-Signal Bot 配置文件
# ============================================================
# 同时监控标普500和纳斯达克100
#
# webhook_url 和 dashboard_url 优先从环境变量读取：
#   WEBHOOK_URL  — 企业微信 Webhook 地址（GitHub Actions 存在 Secrets 中）
#   DASHBOARD_URL — 在线仪表盘 URL（如 https://xxx.github.io/nasdaq-signal-bot/）
#
# 获取企业微信 Webhook：
#   企业微信群 → 右上角群设置 → 群机器人 → 添加机器人 → 复制 Webhook 地址

webhook_url: ""  # 留空则从环境变量 WEBHOOK_URL 读取

dashboard_url: ""  # 留空则从环境变量 DASHBOARD_URL 读取

# ------------------------------------------------------------------
# 标普500 信号阈值（SPY + VIX + CAPE）
# ------------------------------------------------------------------
sp500_thresholds:
  # SPY 回撤阈值（百分比，负数）
  # 回撤 <= 此值时触发信号
  drawdown: -10.0

  # VIX 恐慌指数阈值
  # VIX >= 此值时触发信号（从30降到22，验证显示VIX≥22回撤改善18个百分点）
  vix: 22.0

  # Shiller CAPE（标普500周期调整市盈率）阈值
  # CAPE >= 此值时触发信号（从30提高到35，避免CAPE常态化触发）
  cape: 35.0

# ------------------------------------------------------------------
# 纳斯达克100 信号阈值（QQQ + VIX代理 + QQQ PE）
# ------------------------------------------------------------------
nasdaq100_thresholds:
  # QQQ 回撤阈值（百分比，负数）
  drawdown: -10.0

  # VIX 阈值（VXN数据源不稳定，用VIX代理）
  # 从30降到22，验证显示这是最优阈值
  vxn: 22.0

  # QQQ PE（市盈率）阈值
  qqq_pe: 35.0

# 回撤计算回溯天数（交易日）
lookback_days: 252

# ------------------------------------------------------------------
# 调仓建议（5级仓位配比）
# ------------------------------------------------------------------
# 基于纳斯达克100信号级别给出具体TQQQ/QQQ/现金比例
position_allocation:
  L1: {tqqq: 0.75, qqq: 0.25, cash: 0.00, hint: "满仓进攻"}
  L2: {tqqq: 0.50, qqq: 0.40, cash: 0.10, hint: "减杠杆偏进攻"}
  L3: {tqqq: 0.00, qqq: 0.50, cash: 0.50, hint: "去杠杆防守"}
  L4: {tqqq: 0.00, qqq: 0.25, cash: 0.75, hint: "大幅减仓避险"}
  L5: {tqqq: 0.00, qqq: 0.00, cash: 1.00, hint: "全部撤退"}

# ------------------------------------------------------------------
# 趋势评分（25级连续风险评分，用于预警级别切换）
# ------------------------------------------------------------------
# 不直接决定调仓，而是显示市场趋势方向，
# 提前预警可能的级别升降级。
trend_scoring:
  # DD基线：DD >= 此值视为零风险贡献（百分比）
  dd_baseline: -3.0

  # VIX基线：VIX <= 此值视为零风险贡献
  vix_baseline: 16.0

  # PE基线：PE <= 此值视为零风险贡献
  pe_baseline: 32.0

  # 评分缩放系数：越大评分越敏感
  # 1.0=温和，2.0=适中，3.0=敏感
  scale: 1.0

# ------------------------------------------------------------------
# SPY/SPXL 25级趋势评分（直接用25级做调仓决策）
# ------------------------------------------------------------------
# 回测最优基线：drawdown -14.9%, 年化 45.8%
spy_trend_scoring:
  # DD基线：DD >= 此值视为零风险贡献（百分比）
  dd_baseline: -2.0

  # VIX基线：VIX <= 此值视为零风险贡献
  vix_baseline: 16.0

  # CAPE基线：CAPE <= 此值视为零风险贡献
  # CAPE=41 高于长期均值，CAPE在大部分时间不贡献风险分
  cape_baseline: 41.0

  # 评分缩放系数：5.0=高度敏感，细粒度区分风险
  scale: 5.0

# SPY/SPXL 25级仓位配比表
