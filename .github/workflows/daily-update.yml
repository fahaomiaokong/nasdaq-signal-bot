name: Daily Update & Push

on:
  # 定时触发：美国东部时间 17:00（下午5点，美股收盘后1小时）
  # cron 使用 UTC 时间，美东 17:00 = UTC 21:00（夏令时 EDT, UTC-4）
  #
  # ⚠️ 夏令时调整（美国每年切换 DST）：
  #   - 3月中旬 ~ 11月初（EDT, UTC-4）：cron 用 '0 21 * * *'
  #   - 11月初 ~ 3月中旬（EST, UTC-5）：cron 改为 '0 22 * * *'
  #   每年 3 月和 11 月 DST 切换时需手动更新下面这一行
  schedule:
    - cron: '0 21 * * *'

  # 手动触发（GitHub 页面点击 "Run workflow"）
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式: daily / alert / no_trade'
        required: false
        default: 'daily'

  # push 到 main 分支时触发（首次部署用）
  push:
    branches: [ main ]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许 push commit 和 gh-pages 部署

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily task
        env:
          WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
        run: |
          python daily_task.py

      - name: Commit and push data changes
        run: |
          git config user.name "nasdaq-signal-bot"
          git config user.email "bot@nasdaq-signal.local"

          # 只 commit 数据文件变更
          git add dashboard_data.json dashboard.html index.html || true

          # 检查是否有变更
          if git diff --staged --quiet; then
            echo "No data changes to commit"
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "auto: update dashboard data ${DATE}"
            git pull --rebase origin main || true
            git push
          fi

      - name: Deploy to GitHub Pages
        if: success()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'nasdaq-signal-bot'
          user_email: 'bot@nasdaq-signal.local'
          commit_message: 'deploy: update dashboard'
